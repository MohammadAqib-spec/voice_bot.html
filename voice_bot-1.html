<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Voice Bot - اردو</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: #0a0a0f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', sans-serif;
    color: #fff;
  }
  .container {
    text-align: center;
    padding: 2rem;
    width: 100%;
    max-width: 480px;
  }
  .title {
    font-size: 2rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
    background: linear-gradient(135deg, #a78bfa, #60a5fa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle {
    font-size: 0.95rem;
    color: #6b7280;
    margin-bottom: 3rem;
    direction: ltr;
  }
  .mic-btn {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    cursor: pointer;
    font-size: 2.5rem;
    transition: all 0.3s ease;
    box-shadow: 0 0 40px rgba(99,102,241,0.4);
    margin-bottom: 1.5rem;
    display: block;
    margin: 0 auto 1.5rem;
  }
  .mic-btn.recording {
    background: linear-gradient(135deg, #ef4444, #dc2626);
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }
  .status {
    font-size: 1rem;
    color: #9ca3af;
    margin-bottom: 2rem;
    direction: ltr;
  }
  .status.recording { color: #f87171; }
  .status.loading { color: #fbbf24; }
  .status.speaking { color: #34d399; }
  .chat-area {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 1.5rem;
    min-height: 160px;
    max-height: 260px;
    overflow-y: auto;
    text-align: right;
    margin-bottom: 1rem;
  }
  .message {
    margin-bottom: 1rem;
    padding: 0.75rem 1rem;
    border-radius: 12px;
    font-size: 1rem;
    line-height: 1.8;
  }
  .message.user {
    background: rgba(99,102,241,0.15);
    border: 1px solid rgba(99,102,241,0.2);
    color: #c4b5fd;
  }
  .message.ai {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    color: #e5e7eb;
  }
  .empty-state {
    color: #374151;
    font-size: 0.9rem;
    direction: ltr;
    padding-top: 1rem;
  }
</style>
</head>
<body>
<div class="container">
  <div class="title">اردو AI Bot</div>
  <div class="subtitle">Mic daba kar Urdu mein baat karo</div>
  <button class="mic-btn" id="micBtn" onclick="toggleRecording()">🎙️</button>
  <div class="status" id="status">Mic dabao aur baat karo...</div>
  <div class="chat-area" id="chatArea">
    <div class="empty-state">Abhi koi baat nahi hui — mic dabao!</div>
  </div>
</div>

<script>
  const N8N_URL = 'https://n8n-latest-xub1.onrender.com/webhook/voice-bot';
  let recognition = null;
  let isRecording = false;

  function setupRecognition() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) { alert('Chrome use karein!'); return false; }
    recognition = new SpeechRecognition();
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.lang = 'ur-PK';
    recognition.onresult = async (e) => {
      const text = e.results[0][0].transcript;
      addMessage('user', text);
      setStatus('AI soch raha hai...', 'loading');
      await sendToN8N(text);
    };
    recognition.onerror = () => { setStatus('Error! Dobara try karo.', ''); stopRecording(); };
    recognition.onend = () => { if (isRecording) stopRecording(); };
    return true;
  }

  function toggleRecording() {
    isRecording ? stopRecording() : startRecording();
  }

  function startRecording() {
    if (!recognition && !setupRecognition()) return;
    isRecording = true;
    recognition.start();
    document.getElementById('micBtn').classList.add('recording');
    document.getElementById('micBtn').innerHTML = '⏹️';
    setStatus('Sun raha hun... baat karo!', 'recording');
  }

  function stopRecording() {
    isRecording = false;
    if (recognition) recognition.stop();
    document.getElementById('micBtn').classList.remove('recording');
    document.getElementById('micBtn').innerHTML = '🎙️';
  }

  async function sendToN8N(text) {
    try {
      const res = await fetch(N8N_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: text, language: 'ur' })
      });
      const data = await res.json();
      if (data.text) {
        addMessage('ai', data.text);
        setStatus('Bol raha hun...', 'speaking');
        speakText(data.text);
      } else {
        setStatus('Jawab nahi aaya!', '');
      }
    } catch (err) {
      setStatus('Network error! n8n chal raha hai?', '');
      addMessage('ai', 'Maafi! Koi masla aa gaya.');
    }
  }

  function speakText(text) {
    if ('speechSynthesis' in window) {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'ur-PK';
      u.rate = 0.9;
      u.onend = () => setStatus('Mic dabao aur baat karo...', '');
      window.speechSynthesis.speak(u);
    }
  }

  function addMessage(type, text) {
    const area = document.getElementById('chatArea');
    const empty = area.querySelector('.empty-state');
    if (empty) empty.remove();
    const msg = document.createElement('div');
    msg.className = `message ${type}`;
    msg.innerHTML = `<small style="color:#6b7280">${type === 'user' ? '🎙️ Aap' : '🤖 AI'}</small><br>${text}`;
    area.appendChild(msg);
    area.scrollTop = area.scrollHeight;
  }

  function setStatus(text, cls) {
    const s = document.getElementById('status');
    s.textContent = text;
    s.className = `status ${cls}`;
  }
</script>
</body>
</html>
